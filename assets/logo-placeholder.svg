<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 340" fill="none">
  <!-- Handshake icon in circle -->
  <g transform="translate(140, 130)">
    <!-- Outer C-shape / circle arc -->
    <path d="
      M 0,-90
      C 49.7,-90 90,-49.7 90,0
      C 90,49.7 49.7,90 0,90
      C -49.7,90 -90,49.7 -90,0
    " stroke="#192524" stroke-width="8" stroke-linecap="round" fill="none"/>
    
    <!-- Left arm / sleeve upper -->
    <path d="M -80,-18 C -72,-38 -48,-52 -22,-38 L 8,-18" 
          stroke="#192524" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Right arm / sleeve upper -->
    <path d="M 80,-18 C 72,-38 48,-52 22,-38 L -8,-18" 
          stroke="#192524" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Handshake clasp center -->
    <path d="M -26,-10 C -18,-18 -6,-20 4,-16 C 14,-12 16,0 8,8 L -14,26 C -22,34 -36,32 -42,22 C -50,10 -40,-4 -26,-10 Z"
          stroke="#192524" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M 26,-10 C 18,-18 6,-20 -4,-16 C -14,-12 -16,0 -8,8 L 14,26 C 22,34 36,32 42,22 C 50,10 40,-4 26,-10 Z"
          stroke="#192524" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Fingers left hand -->
    <path d="M -42,22 C -48,30 -44,42 -33,43" stroke="#192524" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M -36,32 C -40,42 -32,52 -20,48" stroke="#192524" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M -24,40 C -24,50 -14,56 -4,50" stroke="#192524" stroke-width="7" stroke-linecap="round" fill="none"/>

    <!-- Fingers right hand -->
    <path d="M 42,22 C 48,30 44,42 33,43" stroke="#192524" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M 36,32 C 40,42 32,52 20,48" stroke="#192524" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M 24,40 C 24,50 14,56 4,50" stroke="#192524" stroke-width="7" stroke-linecap="round" fill="none"/>

    <!-- Bottom arc -->
    <path d="M -90,0 C -90,49.7 -49.7,90 0,90 C 49.7,90 90,49.7 90,0" 
          stroke="#192524" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Wordmark text -->
  <text x="140" y="268" 
        font-family="'Cabinet Grotesk', 'Satoshi', ui-sans-serif, sans-serif" 
        font-size="52" 
        font-weight="700" 
        fill="#192524" 
        text-anchor="middle" 
        letter-spacing="-1">Collabnb</text>
</svg>

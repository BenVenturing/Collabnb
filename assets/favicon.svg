<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <g transform="translate(100,100)">
    <!-- Circle outline with gap at top-right (C-shape) -->
    <circle cx="0" cy="0" r="72" stroke="#192524" stroke-width="8.5" fill="none"
            stroke-dasharray="400" stroke-dashoffset="40" stroke-linecap="round"/>

    <!-- LEFT hand: upper arm/sleeve arc -->
    <path d="M -72,-12 C -65,-48 -28,-62 -6,-38"
          stroke="#192524" stroke-width="9" stroke-linecap="round" fill="none"/>

    <!-- RIGHT hand: upper arm/sleeve arc -->
    <path d="M 72,-12 C 65,-48 28,-62 6,-38"
          stroke="#192524" stroke-width="9" stroke-linecap="round" fill="none"/>

    <!-- Wrist/clasp connection left to right -->
    <path d="M -6,-38 C 4,-44 18,-34 16,-18"
          stroke="#192524" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M 6,-38 C -4,-44 -18,-34 -16,-18"
          stroke="#192524" stroke-width="9" stroke-linecap="round" fill="none"/>

    <!-- Clasped hands center knuckles -->
    <path d="M -20,-8 C -8,-20 8,-20 20,-8 C 28,0 24,14 12,18 C 4,22 -4,22 -12,18 C -24,14 -28,0 -20,-8 Z"
          stroke="#192524" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Left hand fingers curling down -->
    <path d="M -24,10 C -32,22 -28,38 -16,40"
          stroke="#192524" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M -12,20 C -18,34 -10,46 2,44"
          stroke="#192524" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M 2,22 C 0,36 10,46 22,42"
          stroke="#192524" stroke-width="8" stroke-linecap="round" fill="none"/>

    <!-- Right hand fingers curling down -->
    <path d="M 24,10 C 32,22 28,38 16,40"
          stroke="#192524" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>
</svg>
